server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    types {
        application/javascript mjs;
    }

    # The frontend is built for /pipeline/ (see package.json and App.js).
    # Keep the bare host URL canonical without serving a second app root.
    location = / {
        return 302 /pipeline/;
    }

    # API requests must be handled before the frontend's /pipeline/ location.
    location ^~ /pipeline/api/ {
        proxy_pass ${BACKEND_UPSTREAM}/pipeline/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # alias removes the /pipeline/ URI prefix, so, for example,
    # /pipeline/static/js/main.js maps to /usr/share/nginx/html/static/js/main.js.
    location ^~ /pipeline/static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # This also serves public assets such as /pipeline/jenkins.png. Missing
    # files fall back to index.html so React Router supports browser refreshes.
    location ^~ /pipeline/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /pipeline/index.html;
        add_header Access-Control-Allow-Origin * always;
    }
}
