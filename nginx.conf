server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    types {
        application/javascript mjs;
    }

    # Serve static files correctly
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000" always;
        add_header Access-Control-Allow-Origin * always;
    }

    # Main React App Routing fallback
    location / {
        try_files $uri /index.html;
        add_header Access-Control-Allow-Origin * always;
    }

    # Local container baseline: keep the browser on the frontend origin while
    # forwarding the existing API contract to FastAPI inside the Compose network.
    location /pipeline/api/ {
        proxy_pass ${BACKEND_UPSTREAM}/pipeline/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve common assets (favicon, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|json)$ {
        expires max;
        access_log off;
        add_header Cache-Control "public, max-age=31536000" always;
        try_files $uri =404;
    }
}
